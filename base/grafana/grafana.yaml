apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: observability
  labels:
    dashboards: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  config:
    auth:
      disable_login_form: "false"
  adminUser:
    name: grafana-admin-credentials
    key: admin-user
  adminPassword:
    name: grafana-admin-credentials
    key: admin-password
